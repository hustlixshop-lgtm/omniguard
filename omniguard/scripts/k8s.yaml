apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniguard-dashboard
  namespace: omniguard
  labels:
    app: omniguard-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omniguard-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: omniguard-dashboard
    spec:
      containers:
        - name: dashboard
          image: omniguard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: omniguard-dashboard
  namespace: omniguard
spec:
  selector:
    app: omniguard-dashboard
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omniguard-dashboard
  namespace: omniguard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - security.yourcompany.com
      secretName: omniguard-tls
  rules:
    - host: security.yourcompany.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omniguard-dashboard
                port:
                  number: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: omniguard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omniguard-dashboard
  namespace: omniguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omniguard-dashboard
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
