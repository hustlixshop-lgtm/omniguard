name: OmniGuard CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/omniguard

jobs:
  # ── Security scan on every PR ────────────────────────────────
  security-scan:
    name: OmniGuard Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OmniGuard scan
        env:
          OMNIGUARD_URL: ${{ secrets.OMNIGUARD_URL }}
          OMNIGUARD_API_KEY: ${{ secrets.OMNIGUARD_API_KEY }}
          OMNIGUARD_FAIL_ON: high
        run: |
          npm install -g omniguard 2>/dev/null || true
          # Inline: use curl to hit scan-quick
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files | head -50)
          if [ -z "$FILES" ]; then echo "No files to scan"; exit 0; fi
          echo "Scanning $(echo "$FILES" | wc -l) files..."
          RESULT=$(curl -sf -X POST \
            -H "Authorization: Bearer $OMNIGUARD_API_KEY" \
            -H "Content-Type: application/json" \
            "$OMNIGUARD_URL/scan-quick" \
            --data "{\"files\": $(echo "$FILES" | head -20 | while read f; do [ -f "$f" ] && echo "{\"path\":\"$f\",\"content\":$(python3 -c "import json,sys; print(json.dumps(open('$f').read()))" 2>/dev/null || echo '""')}"; done | jq -s .)}" 2>/dev/null || echo '{"findings":[]}')
          CRITICAL=$(echo "$RESULT" | jq '.summary.critical // 0')
          HIGH=$(echo "$RESULT" | jq '.summary.high // 0')
          TOTAL=$(echo "$RESULT" | jq '.summary.total // 0')
          echo "::notice::OmniGuard: $TOTAL findings ($CRITICAL critical, $HIGH high)"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::$CRITICAL critical security finding(s) detected. Review in OmniGuard dashboard."
            exit 1
          fi

  # ── Build and push Docker image ──────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render ─────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" -d '{}' \
          && echo "✓ Render deploy triggered" || echo "Render deploy not configured"
